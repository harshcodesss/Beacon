name: "Beacon incident triage"
description: >-
  Runs Beacon's root-cause triage over your logs and recent commits when a
  deploy fails, comments the evidence-cited report on the triggering PR or
  issue, and (optionally) posts it to your Beacon dashboard.
author: "Harsh Rathi"

branding:
  icon: "alert-triangle"
  color: "yellow"

inputs:
  llm_model:
    description: >-
      Provider-prefixed model string for the whole pipeline, e.g.
      "google_genai:gemini-3.1-flash-lite" or "openai:gpt-4o". Set the matching
      provider key below. Per-agent tiering is available via
      BEACON_GENERATOR_MODEL / BEACON_INVESTIGATOR_MODEL / BEACON_REPORTER_MODEL
      step env vars. See the README for measured model-efficiency comparisons.
    required: false
    default: "google_genai:gemini-3.1-flash-lite"
  gemini_api_key:
    description: >-
      Your Gemini/Google API key (store as a repository secret), for
      google_genai models. Omit all provider keys to run the bundled mock.
    required: false
    default: ""
  openai_api_key:
    description: "Your OpenAI API key, for openai models."
    required: false
    default: ""
  anthropic_api_key:
    description: "Your Anthropic API key, for anthropic models."
    required: false
    default: ""
  log_path:
    description: "Path to the log file to triage, relative to the workspace."
    required: false
    default: "./logs/app.log"
  window_minutes:
    description: "How many minutes of trailing logs to hand to the agent."
    required: false
    default: "30"
  beacon_api_key:
    description: >-
      Project API key from Beacon settings (starts with beacon_sk_). Optional:
      without it the report is still generated and commented, just not
      delivered to the Beacon dashboard.
    required: false
    default: ""
  api_url:
    description: "Base URL of the Beacon API."
    required: false
    default: "https://beacon-cono.onrender.com"
  github_token:
    description: >-
      Token used to comment the report on the triggering PR/issue.
      Defaults to the workflow token; pass an empty string to disable
      commenting.
    required: false
    default: ${{ github.token }}

outputs:
  incident_id:
    description: "ID of the incident created in Beacon (when delivered)."
  report_path:
    description: "Path to the rendered markdown report inside the workspace."

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    BEACON_MODEL: ${{ inputs.llm_model }}
    GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
    OPENAI_API_KEY: ${{ inputs.openai_api_key }}
    ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
    BEACON_API_KEY: ${{ inputs.beacon_api_key }}
    BEACON_LOG_PATH: ${{ inputs.log_path }}
    BEACON_WINDOW_MINUTES: ${{ inputs.window_minutes }}
    BEACON_API_URL: ${{ inputs.api_url }}
    GITHUB_TOKEN: ${{ inputs.github_token }}
