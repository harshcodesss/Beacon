name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  agent-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-agent.txt
      - name: Install dependencies
        run: pip install -r requirements-agent.txt
      - name: Tests
        run: python -m pytest tests/ -q

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Tests
        run: python -m pytest --cov

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build

  action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax-check action entrypoint
        run: python -m compileall action
      - name: Build action image
        # Mirror the real container-action build: context = the Dockerfile's
        # own directory (repo root), which is where it must live so beacon/
        # resolves. Passing an explicit root context here would have masked the
        # bug that broke the action on real runners.
        run: docker build -t beacon-action .
