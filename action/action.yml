name: "Beacon incident triage"
description: >-
  Runs Beacon's root-cause triage over a log window when a deploy fails,
  posts the report to your Beacon dashboard, and comments on the
  triggering pull request or issue.
author: "Harsh Rathi"

branding:
  icon: "alert-triangle"
  color: "yellow"

inputs:
  beacon_api_key:
    description: >-
      Project API key from Beacon settings (starts with beacon_sk_).
      Store it as a repository secret.
    required: true
  log_path:
    description: "Path to the log file to triage, relative to the workspace."
    required: false
    default: "./logs/app.log"
  window_minutes:
    description: "How many minutes of trailing logs to hand to the agent."
    required: false
    default: "30"
  api_url:
    description: "Base URL of the Beacon API."
    required: false
    default: "https://api.beacon.dev"
  github_token:
    description: >-
      Token used to comment the report on the triggering PR/issue.
      Defaults to the workflow token; pass an empty string to disable
      commenting.
    required: false
    default: ${{ github.token }}

outputs:
  incident_id:
    description: "ID of the incident created in Beacon."
  report_path:
    description: "Path to the rendered markdown report inside the workspace."

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    BEACON_API_KEY: ${{ inputs.beacon_api_key }}
    BEACON_LOG_PATH: ${{ inputs.log_path }}
    BEACON_WINDOW_MINUTES: ${{ inputs.window_minutes }}
    BEACON_API_URL: ${{ inputs.api_url }}
    GITHUB_TOKEN: ${{ inputs.github_token }}
